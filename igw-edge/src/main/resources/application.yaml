server:
  port: 8080

spring:
  application:
    name: igw-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          # Phase 0: placeholder URI. Real Keycloak is set up in a later phase
          # (PR #12 brings the local docker-compose stack). The
          # NimbusJwtDecoder caches the JWKS (default 5-minute refresh) so a
          # slow / down JWKS endpoint doesn't fail every request.
          jwk-set-uri: ${IGW_JWT_JWKS_URI:http://localhost:8080/realms/igw/protocol/openid-connect/certs}
  cloud:
    # Note: this project uses Spring Cloud Gateway MVC, so the routes
    # prefix is `spring.cloud.gateway.server.webmvc.routes`, not the
    # `spring.cloud.gateway.routes` used by the reactive gateway. Putting
    # the routes under the wrong prefix silently produces an empty route
    # table and every request 404s.
    gateway:
      server:
        webmvc:
          # Phase 0: a single route that proxies everything to the legacy
          # upstream. The canary split (X-Canary: new → new upstream) is
          # wired in PR #11 with the Weight predicate; Spring Cloud
          # Gateway MVC doesn't support the reactive `!Header` negation
          # syntax, so the two-route + negated-header trick from the
          # previous commit doesn't translate. For Phase 0 the new
          # upstream is unreachable anyway (igw.edge.canary.new-uri is
          # blank by default), so collapsing to one route is correct.
          routes:
            - id: ${igw.edge.canary.route-id-legacy:legacy}
              uri: ${igw.edge.upstream:http://localhost:8081}
              predicates:
                - Path=/**

igw:
  edge:
    upstream: http://localhost:8081
    route-id: legacy
    connect-timeout: 1s
    read-timeout: 5s
    canary:
      # 0 = 100% legacy (Phase 0). 100 = 100% new (post PR #11).
      weight-new: 0
      new-uri: ""
      route-id-legacy: legacy
      route-id-new: new
    security:
      ip-check:
        # Phase 0 default: false. The cache is empty; enabling the check
        # would 403 every request. Enable once the cache is populated.
        enabled: false
    rate-limit:
      # Per-user token bucket (Bucket4j). refill=rps tokens/second, capacity=burst.
      rps: 100
      burst: 200
